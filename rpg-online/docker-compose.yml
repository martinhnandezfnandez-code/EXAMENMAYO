version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rpg-online-db
    environment:
      POSTGRES_DB: rpgonline
      POSTGRES_USER: rpguser
      POSTGRES_PASSWORD: rpgpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpguser -d rpgonline"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
